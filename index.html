<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f26b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BBQ割り勘">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/app-icon.svg">
  <title>BBQ割り勘電卓</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eaf8ff;
      --panel: #ffffff;
      --ink: #183044;
      --muted: #627888;
      --line: #cfe4eb;
      --accent: #f26b3a;
      --accent-strong: #d95021;
      --danger: #c73737;
      --soft: #fff1da;
      --sky: #6ec9ff;
      --grass: #65b96c;
      --shadow: 0 18px 45px rgba(24, 48, 68, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(234, 248, 255, 0.55), rgba(247, 253, 244, 0.96) 560px),
        url("assets/bbq-hero.png") top center / min(1400px, 160vw) auto no-repeat,
        var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 36px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 430px);
      gap: 22px;
      min-height: 250px;
      margin-bottom: 20px;
      align-items: end;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .hero-copy {
      display: grid;
      gap: 10px;
    }

    .hero-scene {
      min-height: 230px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.22)),
        url("assets/bbq-hero.png") center bottom / cover no-repeat;
      box-shadow: 0 18px 42px rgba(24, 48, 68, 0.16);
      overflow: hidden;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      letter-spacing: 0;
      max-width: 620px;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: #2c5061;
      font-size: 16px;
      line-height: 1.7;
      font-weight: 650;
    }

    .tagline {
      width: fit-content;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #17613d;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(24, 48, 68, 0.08);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(330px, 0.88fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255, 241, 218, 0.75), rgba(232, 248, 255, 0.72));
    }

    h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-body {
      padding: 18px;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 12px 12px;
      font: inherit;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242, 107, 58, 0.17);
    }

    .checkbox-field {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 45px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }

    .checkbox-field input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      accent-color: var(--accent);
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 11px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    .ghost {
      background: var(--soft);
      color: #9f3b17;
    }

    .ghost:hover {
      background: #ffe5bc;
    }

    .groups {
      display: grid;
      gap: 10px;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 15px;
      font-weight: 900;
      color: #244658;
    }

    .participant-tool {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 252, 255, 0.82);
    }

    .participant-form {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(140px, 0.75fr) auto;
      gap: 10px;
      align-items: end;
    }

    .participant-list {
      display: grid;
      gap: 8px;
    }

    .participant-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(140px, 0.75fr) 42px;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .participant-summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .history-tool {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 248, 238, 0.86);
    }

    .history-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .danger-button {
      background: #f7ecec;
      color: var(--danger);
    }

    .danger-button:hover {
      background: #f3dddd;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .history-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .history-title {
      font-weight: 900;
      color: #244658;
    }

    .history-total {
      color: #d95021;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .history-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .history-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .group-row {
      display: grid;
      grid-template-columns: minmax(150px, 1.25fr) minmax(72px, 0.55fr) minmax(86px, 0.6fr);
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
    }

    input[readonly] {
      background: #f4f8fa;
      color: #546b78;
    }

    .remove {
      height: 45px;
      background: #f7ecec;
      color: var(--danger);
      font-size: 20px;
      line-height: 1;
    }

    .remove:hover {
      background: #f3dddd;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .result-actions {
      margin: 0;
    }

    .result-hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: linear-gradient(180deg, #fff, #f8fcff);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: clamp(22px, 2.1vw, 30px);
      line-height: 1.15;
      word-break: keep-all;
    }

    .diff.plus strong {
      color: #17613d;
    }

    .diff.minus strong {
      color: var(--danger);
    }

    table {
      display: none;
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
    }

    .result-cards {
      display: grid;
      gap: 10px;
    }

    .result-card {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .result-card-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .result-card-title {
      font-weight: 900;
      color: #244658;
    }

    .result-card-price {
      font-size: 24px;
      font-weight: 950;
      color: #d95021;
      white-space: nowrap;
    }

    .result-card-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .result-card-details strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      vertical-align: top;
      white-space: nowrap;
    }

    th:first-child, td:first-child {
      text-align: left;
      white-space: normal;
    }

    th {
      color: var(--muted);
      font-size: 12px;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .price {
      font-size: 21px;
      font-weight: 900;
      color: #d95021;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .empty {
      padding: 30px 16px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
    }

    @media (max-width: 860px) {
      header {
        grid-template-columns: 1fr;
      }

      .hero-scene {
        min-height: 190px;
      }

      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100% - 18px, 1120px);
        padding-top: 18px;
      }

      body {
        background-size: 980px auto;
      }

      header {
        min-height: 210px;
      }

      .settings,
      .result-hero {
        grid-template-columns: 1fr;
      }

      .group-row {
        grid-template-columns: 1fr 1fr;
      }

      .participant-form,
      .participant-row {
        grid-template-columns: 1fr;
      }

      .history-actions {
        grid-template-columns: 1fr;
      }

      .group-row label:first-child {
        grid-column: 1 / -1;
      }

      .remove {
        width: 100%;
      }

      th, td {
        padding: 10px 7px;
        font-size: 13px;
      }

      .panel-header {
        align-items: stretch;
      }

      .panel-header button,
      .participant-form button {
        width: 100%;
      }

      .actions {
        display: none;
      }

      table {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="hero-copy">
        <div class="tagline">青空BBQの会計を、ざっくり気持ちよく。</div>
        <h1>BBQ割り勘電卓</h1>
      <p class="lead">大人・大学生・高校生・中学生・小学生・未就学児の区分で、参加者メモから人数を自動集計。500円単位に寄せながら、合計との差が一番小さい集め方を探します。</p>
      </div>
      <div class="hero-scene" aria-hidden="true"></div>
    </header>

    <section class="app" aria-label="BBQ割り勘電卓">
      <div class="panel">
        <div class="panel-header">
          <h2>入力</h2>
          <button class="ghost" id="sampleButton" type="button">例を入れる</button>
        </div>
        <div class="panel-body">
          <div class="settings">
            <label>
              BBQ名
              <input id="eventName" placeholder="例: 2026春 BBQ">
            </label>
            <label>
              開催日
              <input id="eventDate" type="date">
            </label>
            <label>
              合計金額
              <input id="totalInput" type="number" min="0" step="100" value="30000" inputmode="numeric">
            </label>
            <label>
              丸め単位
              <select id="roundUnit">
                <option value="100">100円</option>
                <option value="500" selected>500円</option>
                <option value="1000">1,000円</option>
              </select>
            </label>
            <label class="checkbox-field">
              <input id="keepRanks" type="checkbox" checked>
              負担率が違うグループは金額差をつける
            </label>
            <label class="checkbox-field">
              <input id="autoCounts" type="checkbox">
              参加者リストから人数を自動集計
            </label>
          </div>

          <div class="section-title">グループ設定</div>
          <div class="groups" id="groups"></div>

          <div class="section-title">参加者メモ</div>
          <div class="participant-tool">
            <div class="participant-form">
              <label>
                名前
                <input id="participantName" placeholder="例: 田中さん">
              </label>
              <label>
                区分
                <select id="participantCategory"></select>
              </label>
              <button id="addParticipant" type="button">参加者追加</button>
            </div>
            <div class="participant-summary" id="participantSummary"></div>
            <div class="participant-list" id="participants"></div>
          </div>

          <div class="section-title">保存・履歴</div>
          <div class="history-tool">
            <div class="history-actions">
              <button id="saveHistory" type="button">このBBQを履歴に保存</button>
              <button class="danger-button" id="resetCurrent" type="button">新しいBBQを始める</button>
            </div>
            <div class="participant-summary" id="saveStatus"></div>
            <div class="history-list" id="historyList"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>結果</h2>
          <button class="ghost" id="copyResult" type="button">結果をコピー</button>
        </div>
        <div class="panel-body" id="result"></div>
      </div>
    </section>
  </main>

  <script>
    const groupsEl = document.querySelector("#groups");
    const resultEl = document.querySelector("#result");
    const eventName = document.querySelector("#eventName");
    const eventDate = document.querySelector("#eventDate");
    const totalInput = document.querySelector("#totalInput");
    const roundUnit = document.querySelector("#roundUnit");
    const keepRanks = document.querySelector("#keepRanks");
    const autoCounts = document.querySelector("#autoCounts");
    const sampleButton = document.querySelector("#sampleButton");
    const copyResultButton = document.querySelector("#copyResult");
    const participantName = document.querySelector("#participantName");
    const participantCategory = document.querySelector("#participantCategory");
    const addParticipantButton = document.querySelector("#addParticipant");
    const participantsEl = document.querySelector("#participants");
    const participantSummary = document.querySelector("#participantSummary");
    const saveHistoryButton = document.querySelector("#saveHistory");
    const resetCurrentButton = document.querySelector("#resetCurrent");
    const saveStatus = document.querySelector("#saveStatus");
    const historyList = document.querySelector("#historyList");
    let sampleIndex = 0;
    let history = [];
    let isRestoring = false;
    const currentStorageKey = "bbqCalculatorCurrent";
    const historyStorageKey = "bbqCalculatorHistory";

    const standardCategories = [
      { name: "大人（お酒あり）", weight: 1.25 },
      { name: "大人（お酒なし）", weight: 1 },
      { name: "大学生（お酒あり）", weight: 1.1 },
      { name: "大学生（お酒なし）", weight: 0.9 },
      { name: "高校生", weight: 0.75 },
      { name: "中学生", weight: 0.6 },
      { name: "小学生", weight: 0.35 },
      { name: "未就学児", weight: 0.1 }
    ];

    function createStandardGroups(counts = {}, weights = {}) {
      return standardCategories.map((category) => ({
        name: category.name,
        count: counts[category.name] || 0,
        weight: weights[category.name] ?? category.weight
      }));
    }

    const samples = [
      {
        label: "家族多めBBQ",
        total: 30000,
        unit: 500,
        counts: {
          "大人（お酒あり）": 3,
          "大人（お酒なし）": 5,
          "中学生": 6,
          "小学生": 2
        },
        participants: [
          { name: "田中さん", category: "大人（お酒あり）" },
          { name: "山本さん", category: "大人（お酒あり）" },
          { name: "鈴木さん", category: "大人（お酒あり）" },
          { name: "佐藤さん", category: "大人（お酒なし）" },
          { name: "佐藤さん妻", category: "大人（お酒なし）" },
          { name: "高橋さん", category: "大人（お酒なし）" },
          { name: "伊藤さん", category: "大人（お酒なし）" },
          { name: "幹事", category: "大人（お酒なし）" },
          { name: "佐藤家 長男", category: "中学生" },
          { name: "佐藤家 長女", category: "中学生" },
          { name: "田中家 長男", category: "中学生" },
          { name: "鈴木家 長女", category: "中学生" },
          { name: "山本家 次男", category: "中学生" },
          { name: "伊藤家 長男", category: "中学生" },
          { name: "高橋家 次女", category: "小学生" },
          { name: "田中家 次女", category: "小学生" }
        ]
      },
      {
        label: "友達キャンプ",
        total: 48500,
        unit: 500,
        counts: {
          "大人（お酒あり）": 7,
          "大人（お酒なし）": 4,
          "高校生": 3,
          "小学生": 4
        },
        participants: [
          { name: "中村", category: "大人（お酒あり）" },
          { name: "小林", category: "大人（お酒あり）" },
          { name: "森", category: "大人（お酒あり）" },
          { name: "石川", category: "大人（お酒あり）" },
          { name: "藤井", category: "大人（お酒あり）" },
          { name: "青木", category: "大人（お酒あり）" },
          { name: "岡田", category: "大人（お酒あり）" },
          { name: "加藤", category: "大人（お酒なし）" },
          { name: "前田", category: "大人（お酒なし）" },
          { name: "近藤", category: "大人（お酒なし）" },
          { name: "原", category: "大人（お酒なし）" },
          { name: "高校生A", category: "高校生" },
          { name: "高校生B", category: "高校生" },
          { name: "高校生C", category: "高校生" },
          { name: "小学生A", category: "小学生" },
          { name: "小学生B", category: "小学生" },
          { name: "小学生C", category: "小学生" },
          { name: "小学生D", category: "小学生" }
        ]
      },
      {
        label: "町内会BBQ",
        total: 72000,
        unit: 500,
        counts: {
          "大人（お酒あり）": 8,
          "大人（お酒なし）": 10,
          "中学生": 8,
          "小学生": 10,
          "未就学児": 4
        },
        participants: [
          { name: "受付メモ: 田中家", category: "未定" },
          { name: "大人代表 1", category: "大人（お酒あり）" },
          { name: "大人代表 2", category: "大人（お酒あり）" },
          { name: "大人代表 3", category: "大人（お酒なし）" },
          { name: "大人代表 4", category: "大人（お酒なし）" },
          { name: "中学生 1", category: "中学生" },
          { name: "中学生 2", category: "中学生" },
          { name: "小学生 1", category: "小学生" },
          { name: "小学生 2", category: "小学生" },
          { name: "未就学児 1", category: "未就学児" }
        ]
      },
      {
        label: "少人数ランチBBQ",
        total: 18500,
        unit: 500,
        counts: {
          "大人（お酒なし）": 5,
          "中学生": 2,
          "小学生": 3
        },
        participants: [
          { name: "渡辺さん", category: "大人（お酒なし）" },
          { name: "渡辺さん妻", category: "大人（お酒なし）" },
          { name: "松本さん", category: "大人（お酒なし）" },
          { name: "井上さん", category: "大人（お酒なし）" },
          { name: "幹事", category: "大人（お酒なし）" },
          { name: "渡辺家 長男", category: "中学生" },
          { name: "松本家 長女", category: "中学生" },
          { name: "井上家 子ども1", category: "小学生" },
          { name: "井上家 子ども2", category: "小学生" },
          { name: "松本家 次男", category: "小学生" }
        ]
      }
    ];

    let groups = createStandardGroups({
      "大人（お酒あり）": 3,
      "大人（お酒なし）": 5,
      "中学生": 6,
      "小学生": 2
    });

    let participants = [];

    const yen = new Intl.NumberFormat("ja-JP", {
      style: "currency",
      currency: "JPY",
      maximumFractionDigits: 0
    });

    function formatYen(value) {
      return yen.format(Math.round(value));
    }

    function formatSignedYen(value) {
      const rounded = Math.round(value);
      if (rounded === 0) return "±0円";
      return `${rounded > 0 ? "+" : "-"}${formatYen(Math.abs(rounded))}`;
    }

    function safeNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function todayString() {
      return new Date().toISOString().slice(0, 10);
    }

    function currentSnapshot() {
      return {
        eventName: eventName.value.trim(),
        eventDate: eventDate.value,
        total: safeNumber(totalInput.value),
        unit: safeNumber(roundUnit.value, 500),
        keepRanks: keepRanks.checked,
        autoCounts: autoCounts.checked,
        groups: groups.map((group) => ({ ...group })),
        participants: participants.map((participant) => ({ ...participant }))
      };
    }

    function applySnapshot(snapshot) {
      if (!snapshot) return;

      isRestoring = true;
      eventName.value = snapshot.eventName || "";
      eventDate.value = snapshot.eventDate || todayString();
      totalInput.value = snapshot.total ?? 30000;
      roundUnit.value = snapshot.unit ?? 500;
      keepRanks.checked = snapshot.keepRanks ?? true;
      autoCounts.checked = snapshot.autoCounts ?? false;
      groups = Array.isArray(snapshot.groups) && snapshot.groups.length
        ? createStandardGroups(
          snapshot.groups.reduce((counts, group) => {
            counts[group.name] = group.count;
            return counts;
          }, {}),
          snapshot.groups.reduce((weights, group) => {
            weights[group.name] = group.weight;
            return weights;
          }, {})
        )
        : createStandardGroups();
      participants = Array.isArray(snapshot.participants)
        ? snapshot.participants.map((participant) => ({ ...participant }))
        : [];
      isRestoring = false;
      refreshAll();
    }

    function loadStoredData() {
      try {
        history = JSON.parse(localStorage.getItem(historyStorageKey) || "[]");
        const current = JSON.parse(localStorage.getItem(currentStorageKey) || "null");
        if (current) {
          applySnapshot(current);
          return true;
        }
      } catch (error) {
        history = [];
      }
      return false;
    }

    function saveCurrentState() {
      if (isRestoring) return;
      localStorage.setItem(currentStorageKey, JSON.stringify(currentSnapshot()));
    }

    function saveHistory() {
      const plan = calculate();
      if (!plan) return;

      const snapshot = currentSnapshot();
      const fallbackName = snapshot.eventDate ? `${snapshot.eventDate} BBQ` : "BBQ";
      const record = {
        id: String(Date.now()),
        savedAt: new Date().toISOString(),
        title: snapshot.eventName || fallbackName,
        eventDate: snapshot.eventDate || todayString(),
        total: Math.max(0, safeNumber(totalInput.value)),
        collected: plan.collected,
        diff: plan.diff,
        participantCount: participants.filter((participant) => participant.category !== "未定").length,
        snapshot
      };

      history = [record, ...history].slice(0, 20);
      localStorage.setItem(historyStorageKey, JSON.stringify(history));
      saveStatus.textContent = `${record.title} を履歴に保存しました。`;
      renderHistory();
    }

    function resetCurrent() {
      const ok = confirm("今の入力を空にして、新しいBBQを始めますか？履歴は残ります。");
      if (!ok) return;

      eventName.value = "";
      eventDate.value = todayString();
      totalInput.value = 0;
      roundUnit.value = 500;
      keepRanks.checked = true;
      autoCounts.checked = true;
      groups = createStandardGroups();
      participants = [];
      sampleButton.textContent = "例を入れる";
      saveStatus.textContent = "新しいBBQを始めました。";
      refreshAll();
    }

    function getParticipantCounts() {
      const groupNames = new Set(groups.map((group) => group.name));
      return participants.reduce((counts, participant) => {
        if (participant.category && groupNames.has(participant.category)) {
          counts[participant.category] = (counts[participant.category] || 0) + 1;
        }
        return counts;
      }, {});
    }

    function getDisplayCount(group) {
      if (!autoCounts.checked) return Math.max(0, Math.floor(safeNumber(group.count)));
      const counts = getParticipantCounts();
      return counts[group.name] || 0;
    }

    function renderParticipantOptions() {
      const current = participantCategory.value || "未定";
      participantCategory.replaceChildren(
        new Option("未定（計算に入れない）", "未定"),
        ...groups.map((group) => new Option(group.name, group.name))
      );
      participantCategory.value = groups.some((group) => group.name === current) ? current : "未定";
    }

    function createCategorySelect(index, selectedCategory) {
      const select = document.createElement("select");
      select.dataset.participantField = "category";
      select.dataset.participantIndex = String(index);
      select.setAttribute("aria-label", "区分");
      select.append(
        new Option("未定", "未定"),
        ...groups.map((group) => new Option(group.name, group.name))
      );
      select.value = groups.some((group) => group.name === selectedCategory) ? selectedCategory : "未定";
      return select;
    }

    function renderGroups() {
      groupsEl.innerHTML = "";
      groups.forEach((group, index) => {
        const displayCount = getDisplayCount(group);
        const countNote = autoCounts.checked ? "参加者から自動" : "人数";
        const row = document.createElement("div");
        row.className = "group-row";
        row.innerHTML = `
          <label>
            区分
            <input data-field="name" data-index="${index}" value="${escapeHtml(group.name)}" readonly>
          </label>
          <label>
            ${countNote}
            <input data-field="count" data-index="${index}" type="number" min="0" step="1" value="${displayCount}" inputmode="numeric" ${autoCounts.checked ? "readonly" : ""}>
          </label>
          <label>
            負担率
            <input data-field="weight" data-index="${index}" type="number" min="0" step="0.1" value="${group.weight}" inputmode="decimal">
          </label>
        `;
        groupsEl.appendChild(row);
      });
      renderParticipantOptions();
    }

    function renderParticipants() {
      const counts = getParticipantCounts();
      const groupNames = new Set(groups.map((group) => group.name));
      const counted = participants.filter((participant) => groupNames.has(participant.category)).length;
      const pending = participants.length - counted;
      const groupText = groups
        .map((group) => `${group.name} ${counts[group.name] || 0}人`)
        .join(" / ");

      participantSummary.textContent = participants.length
        ? `参加予定 ${counted}人、未定 ${pending}人。${groupText}`
        : "名前と区分を入れると、参加者メモとして残せます。自動集計をONにすると、この人数がグループ設定に反映されます。";

      participantsEl.innerHTML = "";
      participants.forEach((participant, index) => {
        const row = document.createElement("div");
        const nameInput = document.createElement("input");
        const removeButton = document.createElement("button");

        row.className = "participant-row";
        nameInput.dataset.participantField = "name";
        nameInput.dataset.participantIndex = String(index);
        nameInput.value = participant.name;
        nameInput.setAttribute("aria-label", "参加者名");

        removeButton.className = "remove";
        removeButton.dataset.participantRemove = String(index);
        removeButton.type = "button";
        removeButton.setAttribute("aria-label", `${participant.name}を削除`);
        removeButton.textContent = "×";

        row.append(nameInput, createCategorySelect(index, participant.category), removeButton);
        participantsEl.appendChild(row);
      });
    }

    function refreshAll() {
      renderGroups();
      renderParticipants();
      renderHistory();
      calculate();
      saveCurrentState();
    }

    function renderHistory() {
      if (!history.length) {
        historyList.innerHTML = `<div class="participant-summary">履歴はまだありません。計算が終わったら「このBBQを履歴に保存」を押すと残せます。</div>`;
        return;
      }

      historyList.innerHTML = "";
      history.forEach((record) => {
        const item = document.createElement("div");
        const diffText = record.diff >= 0
          ? `余り ${formatYen(Math.abs(record.diff))}`
          : `不足 ${formatYen(Math.abs(record.diff))}`;

        item.className = "history-item";
        item.innerHTML = `
          <div class="history-item-top">
            <div class="history-title">${escapeHtml(record.title)}</div>
            <div class="history-total">${formatYen(record.total)}</div>
          </div>
          <div class="history-meta">${escapeHtml(record.eventDate)} / ${record.participantCount}人 / 集めた額 ${formatYen(record.collected)} / ${diffText}</div>
          <div class="history-buttons">
            <button class="ghost" data-history-load="${record.id}" type="button">読み込む</button>
            <button class="danger-button" data-history-delete="${record.id}" type="button">削除</button>
          </div>
        `;
        historyList.appendChild(item);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getValidGroups() {
      return groups
        .map((group) => ({
          name: group.name.trim() || "未設定",
          count: getDisplayCount(group),
          weight: Math.max(0, safeNumber(group.weight))
        }))
        .filter((group) => group.count > 0 && group.weight > 0);
    }

    function buildCandidates(ideal, unit) {
      const center = Math.round(ideal / unit);
      const values = new Set();
      for (let offset = -8; offset <= 8; offset += 1) {
        values.add(Math.max(0, (center + offset) * unit));
      }
      values.add(Math.floor(ideal / unit) * unit);
      values.add(Math.ceil(ideal / unit) * unit);
      return [...values]
        .filter((value) => value >= 0)
        .sort((a, b) => Math.abs(a - ideal) - Math.abs(b - ideal))
        .slice(0, 13)
        .sort((a, b) => a - b);
    }

    function calculate() {
      const total = Math.max(0, safeNumber(totalInput.value));
      const unit = Math.max(1, safeNumber(roundUnit.value, 500));
      const shouldKeepRanks = keepRanks.checked;
      const validGroups = getValidGroups();
      const totalWeight = validGroups.reduce((sum, group) => sum + group.count * group.weight, 0);

      if (!total || !totalWeight || validGroups.length === 0) {
        resultEl.innerHTML = `<div class="empty">合計金額・人数・負担率を入れると結果が出ます。</div>`;
        return null;
      }

      const rows = validGroups.map((group) => {
        const ideal = total * group.weight / totalWeight;
        return {
          ...group,
          ideal,
          candidates: buildCandidates(ideal, unit)
        };
      });

      const best = findBestPlan(rows, total, shouldKeepRanks, unit);
      renderResult(best, total, unit);
      return best;
    }

    function findBestPlan(rows, total, shouldKeepRanks, unit) {
      let best = null;
      const chosen = [];

      function violatesRankRule(prices) {
        if (!shouldKeepRanks) return false;

        for (let i = 0; i < rows.length; i += 1) {
          for (let j = 0; j < rows.length; j += 1) {
            if (rows[i].weight > rows[j].weight && prices[i] < prices[j] + unit) {
              return true;
            }
          }
        }
        return false;
      }

      function scorePlan() {
        if (violatesRankRule(chosen)) return null;

        const collected = rows.reduce((sum, row, index) => sum + chosen[index] * row.count, 0);
        const diff = collected - total;
        const fairness = rows.reduce((sum, row, index) => {
          const gap = chosen[index] - row.ideal;
          return sum + row.count * gap * gap;
        }, 0);
        const score = [Math.abs(diff), diff < 0 ? 1 : 0, fairness];
        return { collected, diff, fairness, score };
      }

      function isBetter(a, b) {
        if (!b) return true;
        for (let i = 0; i < a.score.length; i += 1) {
          if (a.score[i] !== b.score[i]) return a.score[i] < b.score[i];
        }
        return false;
      }

      function walk(index) {
        if (index === rows.length) {
          const scored = scorePlan();
          if (!scored) return;

          if (isBetter(scored, best)) {
            best = { ...scored, prices: [...chosen] };
          }
          return;
        }

        rows[index].candidates.forEach((candidate) => {
          chosen[index] = candidate;
          walk(index + 1);
        });
      }

      walk(0);

      if (!best && shouldKeepRanks) {
        const relaxedPlan = findBestPlan(rows, total, false, unit);
        relaxedPlan.rankRuleRequested = true;
        relaxedPlan.keptRanks = false;
        return relaxedPlan;
      }

      return {
        rows: rows.map((row, index) => ({
          ...row,
          price: best.prices[index],
          subtotal: best.prices[index] * row.count
        })),
        collected: best.collected,
        diff: best.diff,
        keptRanks: shouldKeepRanks,
        rankRuleRequested: shouldKeepRanks
      };
    }

    function renderResult(plan, total, unit) {
      const diffClass = plan.diff >= 0 ? "plus" : "minus";
      const diffLabel = plan.diff >= 0 ? "余り（幹事に残る）" : "不足（幹事負担）";
      const rankNote = plan.rankRuleRequested && !plan.keptRanks
        ? "負担率ごとの金額差を保つ組み合わせが見つからなかったため、この回だけ差額最小を優先しています。"
        : "負担率が違うグループは、原則として丸め単位ぶん以上の金額差をつけています。";
      const resultRows = plan.rows.map((row) => `
        <tr>
          <td>
            <strong>${escapeHtml(row.name)}</strong><br>
            <small>理想 ${formatYen(row.ideal)} / 人</small>
          </td>
          <td>${row.count}人</td>
          <td>${row.weight}</td>
          <td><span class="price">${formatYen(row.price)}</span></td>
          <td>${formatSignedYen(row.price - row.ideal)} / 人</td>
          <td>${formatYen(row.subtotal)}</td>
        </tr>
      `).join("");
      const resultCards = plan.rows.map((row) => `
        <article class="result-card">
          <div class="result-card-header">
            <div class="result-card-title">${escapeHtml(row.name)}</div>
            <div class="result-card-price">${formatYen(row.price)}</div>
          </div>
          <div class="result-card-details">
            <div>人数<strong>${row.count}人</strong></div>
            <div>小計<strong>${formatYen(row.subtotal)}</strong></div>
            <div>負担率<strong>${row.weight}</strong></div>
            <div>理想との差<strong>${formatSignedYen(row.price - row.ideal)} / 人</strong></div>
          </div>
        </article>
      `).join("");

      resultEl.innerHTML = `
        <div class="result-hero">
          <div class="metric">
            <span>実際に集める合計</span>
            <strong>${formatYen(plan.collected)}</strong>
          </div>
          <div class="metric">
            <span>会計</span>
            <strong>${formatYen(total)}</strong>
          </div>
          <div class="metric diff ${diffClass}">
            <span>${diffLabel}</span>
            <strong>${formatYen(Math.abs(plan.diff))}</strong>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>グループ</th>
              <th>人数</th>
              <th>率</th>
              <th>一人あたり</th>
              <th>理想との差</th>
              <th>小計</th>
            </tr>
          </thead>
          <tbody>${resultRows}</tbody>
        </table>
        <div class="result-cards">${resultCards}</div>
        <p class="hint">${unit.toLocaleString("ja-JP")}円単位で、実際に集める合計が会計に近くなる組み合わせを選んでいます。切り捨て固定ではありません。不足は幹事負担、余りは幹事に残る金額として表示しています。${rankNote}</p>
      `;
    }

    function copyResult() {
      const plan = calculate();
      if (!plan) return;

      const total = Math.max(0, safeNumber(totalInput.value));
      const lines = [
        "BBQ割り勘結果",
        `会計: ${formatYen(total)}`,
        `集める合計: ${formatYen(plan.collected)}`,
        `${plan.diff >= 0 ? "余り（幹事に残る）" : "不足（幹事負担）"}: ${formatYen(Math.abs(plan.diff))}`,
        "",
        ...plan.rows.map((row) => `${row.name}: ${formatYen(row.price)} / 人 × ${row.count}人 = ${formatYen(row.subtotal)}`)
      ];

      navigator.clipboard?.writeText(lines.join("\n"));
      copyResultButton.textContent = "コピーしました";
      setTimeout(() => {
        copyResultButton.textContent = "結果をコピー";
      }, 1400);
    }

    groupsEl.addEventListener("input", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      const field = target.dataset.field;
      if (!Number.isInteger(index) || !field) return;

      if (field === "count" && autoCounts.checked) return;
      if (field === "name") {
        const oldName = groups[index].name;
        groups[index].name = target.value;
        participants = participants.map((participant) => (
          participant.category === oldName
            ? { ...participant, category: target.value }
            : participant
        ));
        renderParticipantOptions();
        renderParticipants();
        calculate();
        saveCurrentState();
        return;
      }

      groups[index][field] = field === "name" ? target.value : safeNumber(target.value);
      calculate();
      saveCurrentState();
    });

    groupsEl.addEventListener("click", (event) => {
      const removeIndex = Number(event.target.dataset.remove);
      if (!Number.isInteger(removeIndex)) return;

      const removedName = groups[removeIndex]?.name;
      groups.splice(removeIndex, 1);
      participants = participants.map((participant) => (
        participant.category === removedName
          ? { ...participant, category: "未定" }
          : participant
      ));
      refreshAll();
    });

    eventName.addEventListener("input", saveCurrentState);
    eventDate.addEventListener("change", saveCurrentState);
    totalInput.addEventListener("input", () => {
      calculate();
      saveCurrentState();
    });
    roundUnit.addEventListener("change", () => {
      calculate();
      saveCurrentState();
    });
    keepRanks.addEventListener("change", () => {
      calculate();
      saveCurrentState();
    });
    autoCounts.addEventListener("change", refreshAll);

    function addParticipant() {
      const name = participantName.value.trim();
      if (!name) {
        participantName.focus();
        return;
      }

      participants.push({
        name,
        category: participantCategory.value || "未定"
      });
      participantName.value = "";
      refreshAll();
      participantName.focus();
    }

    function buildParticipantsFromGroups(sourceGroups) {
      return sourceGroups.flatMap((group) => (
        Array.from({ length: Math.max(0, Math.floor(group.count)) }, (_, index) => ({
          name: `${group.name} ${index + 1}`,
          category: group.name
        }))
      ));
    }

    addParticipantButton.addEventListener("click", addParticipant);
    participantName.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addParticipant();
      }
    });

    function updateParticipantFromEvent(event) {
      const target = event.target;
      const index = Number(target.dataset.participantIndex);
      const field = target.dataset.participantField;
      if (!Number.isInteger(index) || !field) return;

      participants[index][field] = target.value;
      if (field === "name") {
        saveCurrentState();
        return;
      }

      renderGroups();
      renderParticipants();
      calculate();
      saveCurrentState();
    }

    participantsEl.addEventListener("input", updateParticipantFromEvent);
    participantsEl.addEventListener("change", updateParticipantFromEvent);

    participantsEl.addEventListener("click", (event) => {
      const removeIndex = Number(event.target.dataset.participantRemove);
      if (!Number.isInteger(removeIndex)) return;

      participants.splice(removeIndex, 1);
      refreshAll();
    });

    saveHistoryButton.addEventListener("click", saveHistory);
    resetCurrentButton.addEventListener("click", resetCurrent);

    historyList.addEventListener("click", (event) => {
      const loadId = event.target.dataset.historyLoad;
      const deleteId = event.target.dataset.historyDelete;

      if (loadId) {
        const record = history.find((item) => item.id === loadId);
        if (record) {
          applySnapshot(record.snapshot);
          saveStatus.textContent = `${record.title} を読み込みました。`;
        }
      }

      if (deleteId) {
        history = history.filter((item) => item.id !== deleteId);
        localStorage.setItem(historyStorageKey, JSON.stringify(history));
        renderHistory();
      }
    });

    sampleButton.addEventListener("click", () => {
      const sample = samples[sampleIndex % samples.length];
      sampleIndex += 1;
      totalInput.value = sample.total;
      roundUnit.value = sample.unit;
      groups = createStandardGroups(sample.counts);
      const sampleParticipantCount = sample.participants.reduce((sum, participant) => (
        participant.category === "未定" ? sum : sum + 1
      ), 0);
      const sampleGroupCount = groups.reduce((sum, group) => sum + group.count, 0);
      participants = sampleParticipantCount === sampleGroupCount
        ? sample.participants.map((participant) => ({ ...participant }))
        : buildParticipantsFromGroups(groups);
      autoCounts.checked = true;
      sampleButton.textContent = `例: ${sample.label}`;
      refreshAll();
    });

    copyResultButton.addEventListener("click", copyResult);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./service-worker.js");
    }

    if (!loadStoredData()) {
      eventDate.value = todayString();
      refreshAll();
    } else {
      renderHistory();
    }
  </script>
</body>
</html>
